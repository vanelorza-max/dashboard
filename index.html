<style>

    --bg:#0b0d10; --panel:#14171c; --panel2:#1b1f26; --border:#262b33;
    --green:#22c55e; --green-dim:#16321f; --red:#ef4444; --red-dim:#3a1a1a;
    --amber:#f59e0b; --text:#e8eaed; --text-dim:#8b93a1; --accent:#3b82f6;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;padding:0;}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 16px 44px;}
  h1{font-size:20px;margin:0 0 2px;}
  .subtitle{color:var(--text-dim);font-size:12px;margin-bottom:18px;}
  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{background:var(--panel);border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
  .tab-btn.active{background:var(--panel2);color:var(--text);border-color:var(--accent);}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .kpi .label{font-size:10px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;letter-spacing:.04em;}
  .kpi .value{font-size:20px;font-weight:700;}
  .pos{color:var(--green);} .neg{color:var(--red);}
  .section-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin:22px 0 10px;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:10px;overflow:hidden;border:1px solid var(--border);font-size:12.5px;}
  th,td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);}
  th:first-child,td:first-child{text-align:left;}
  th{color:var(--text-dim);font-weight:600;font-size:10.5px;text-transform:uppercase;background:var(--panel2);}
  tr:last-child td{border-bottom:none;}
  .form-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:4px;min-width:130px;flex:1;}
  .field label{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.03em;}
  .field select,.field input{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;width:100%;}
  button.primary{background:linear-gradient(135deg,#3b82f6,#22c55e);border:none;color:#fff;font-weight:700;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;}
  button.danger{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;}
  button.danger:hover{border-color:var(--red);color:var(--red);}
  .empty-msg{color:var(--text-dim);font-size:12.5px;padding:16px;text-align:center;background:var(--panel);border:1px dashed var(--border);border-radius:10px;margin-bottom:14px;}
  .status-msg{font-size:11.5px;margin-top:8px;min-height:14px;}
  .status-msg.ok{color:var(--green);}
  .status-msg.err{color:var(--red);}
  .acc-day-tables{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .day-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;}
  .day-card h4{margin:0 0 8px;font-size:13px;}
  .day-card table{border:none;}
  /* Calendario mensual */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-head{background:var(--panel2);border-radius:8px;padding:7px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.05em;}
  .cal-day{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:7px 8px;min-height:64px;font-size:10.5px;}
  .cal-day.empty{background:transparent;border-color:transparent;}
  .cal-day.day-up{border-color:rgba(34,197,94,.45);background:linear-gradient(180deg,rgba(34,197,94,.07),var(--panel));}
  .cal-day.day-down{border-color:rgba(239,68,68,.45);background:linear-gradient(180deg,rgba(239,68,68,.07),var(--panel));}
  .cal-day .dnum{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--text);}
  .cal-day .acc-line{display:flex;justify-content:space-between;gap:4px;line-height:1.5;color:var(--text-dim);}
  .cal-day .acc-line .v{font-weight:600;}
  .cal-day .day-total{display:flex;justify-content:space-between;gap:4px;border-top:1px solid var(--border);margin-top:4px;padding-top:3px;font-weight:800;font-size:11px;}
  @media(max-width:700px){

  }

  .loading{text-align:center;color:var(--text-dim);padding:40px;font-size:13px;}

function applyCorrections(entries){
  let changed = false;
  const before = entries.length;
  entries = entries.filter(e => !REMOVED_ACCOUNTS.some(r => r.group===e.group && r.accId===e.accId));
  if(entries.length !== before) changed = true;
  for(const c of CORRECTIONS){
    const idx = entries.findIndex(e => e.group===c.group && e.accId===c.accId && e.date===c.date);
    if(idx >= 0){
      if(entries[idx].pnl !== c.pnl){ entries[idx].pnl = c.pnl; changed = true; }
    } else {
      entries.push({group:c.group, accId:c.accId, date:c.date, pnl:c.pnl});
      changed = true;
    }
  }
  return {entries, changed};
}

}

// ====== CÁLCULOS ======
function entriesFor(group, accId){
  return state.entries.filter(e=>e.group===group && e.accId===accId).sort((a,b)=>a.date.localeCompare(b.date));
}
function accountBalance(acc, group){
  return acc.balance0 + entriesFor(group, acc.id).reduce((s,e)=>s+e.pnl,0);
}
function monthEntries(group, accId, mk){
  return entriesFor(group, accId).filter(e=>monthKey(e.date)===mk);
}
function accountMonthPnl(acc, group, mk){
  return monthEntries(group, acc.id, mk).reduce((s,e)=>s+e.pnl,0);
}
function fmt(n){
  const sign = n<0?'-':'';
  return sign+'$'+Math.abs(n).toLocaleString('es-CO',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtShort(n){
  const sign = n<0?'-':'+';
  return sign+Math.abs(n).toLocaleString('es-CO',{minimumFractionDigits:0,maximumFractionDigits:2});
}
// Calendario mensual: cada día muestra el P&L por cuenta y el total del día
function renderCalendar(groupKeys, mk){
  const year = parseInt(mk.slice(0,4));
  const month = parseInt(mk.slice(5,7))-1;
  const firstDow = new Date(year, month, 1).getDay(); // 0=domingo
  const daysInMonth = new Date(year, month+1, 0).getDate();

  // Cuentas incluidas
  const accList = [];
  for(const g of groupKeys){
    for(const acc of (ACCOUNTS[g]||[])) accList.push({group:g, acc});
  }

  // Mapa fecha -> {accKey: pnl}
  const byDate = {};
  for(const e of state.entries){
    if(monthKey(e.date)!==mk) continue;
    if(!groupKeys.includes(e.group)) continue;
    if(!byDate[e.date]) byDate[e.date] = {};
    byDate[e.date][e.group+':'+e.accId] = e.pnl;
  }

  let html = '<div class="cal">';
  for(const dow of ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB']){
    html += '<div class="cal-head">'+dow+'</div>';
  }
  for(let i=0;i<firstDow;i++) html += '<div class="cal-day empty"></div>';
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = mk+'-'+String(d).padStart(2,'0');
    const dayData = byDate[dateStr];
    if(!dayData){
      html += '<div class="cal-day"><div class="dnum">'+d+'</div></div>';
      continue;
    }
    let total = 0;
    let lines = '';
    for(const {group, acc} of accList){
      const key = group+':'+acc.id;
      if(dayData[key]!==undefined){
        const p = dayData[key];
        total += p;
        lines += '<div class="acc-line"><span>'+acc.id+'</span><span class="v '+(p>=0?'pos':'neg')+'">'+fmtShort(p)+'</span></div>';
      }
    }
    const cls = total>0?'day-up':(total<0?'day-down':'');
    html += '<div class="cal-day '+cls+'"><div class="dnum">'+d+'</div>'
      + lines
      + '<div class="day-total"><span>Total</span><span class="'+(total>=0?'pos':'neg')+'">'+fmtShort(total)+'</span></div>'
      + '</div>';
  }
  html += '</div>';
  return html;
}
function pct(bal, target, base){
  const range = target-base;
  if(range<=0) return 0;
  return Math.max(0, Math.min(100, Math.round(((bal-base)/range)*100)));
}

  // Tabs
  html += '<div class="tabs">';
  const tabs = [['resumen','Resumen del mes'],['pilar','Cuentas Pili'],['raul','Cuentas Raúl']];
  for(const [key,label] of tabs){
    html += '<button class="tab-btn '+(state.tab===key?'active':'')+'" data-tab="'+key+'">'+label+'</button>';
  }
  html += '</div>';

  if(state.tab==='registrar'){
    html += '<div class="form-box">';
    html += '<div class="section-title" style="margin-top:0;">Agregar cierre del día</div>';
    html += '<div class="form-row">';
    html += '<div class="field"><label>Grupo</label><select id="f-group">';
    for(const g of Object.keys(ACCOUNTS)){
      if(ACCOUNTS[g].length>0) html += '<option value="'+g+'">'+GROUP_LABELS[g]+'</option>';
    }
    html += '</select></div>';
    html += '<div class="field"><label>Cuenta</label><select id="f-account"></select></div>';
    html += '<div class="field"><label>Fecha</label><input type="date" id="f-date" value="'+todayISO()+'"/></div>';
    html += '<div class="field"><label>P&L del día</label><input type="number" step="0.01" id="f-pnl" placeholder="130.00 ó -45.50"/></div>';
    html += '<button class="primary" id="f-save">Guardar</button>';
    html += '</div>';
    html += '<div class="status-msg '+state.statusType+'">'+state.statusMsg+'</div>';
    html += '</div>';

    // Lista de registros recientes con opción de borrar
    html += '<div class="section-title">Últimos registros</div>';
    const recent = [...state.entries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,15);
    if(recent.length===0){
      html += '<div class="empty-msg">Aún no hay registros. Agrega el primer cierre arriba.</div>';
    } else {
      html += '<table><thead><tr><th>Fecha</th><th>Cuenta</th><th>P&L</th><th></th></tr></thead><tbody>';
      for(const e of recent){
        const acc = (ACCOUNTS[e.group]||[]).find(a=>a.id===e.accId);
        html += '<tr><td>'+e.date+'</td><td>'+(acc?acc.label:e.accId)+'</td>'
          +'<td class="'+(e.pnl>=0?'pos':'neg')+'">'+(e.pnl>=0?'+':'')+fmt(e.pnl)+'</td>'
          +'<td><button class="danger" data-del="'+e.group+'|'+e.accId+'|'+e.date+'">borrar</button></td></tr>';
      }
      html += '</tbody></table>';
    }
  }
  else if(state.tab==='resumen'){
    let totalMonth=0, totalProfit=0;
    let rows='';
    let activeAccounts=0;
    let minCushion = null, minCushionAcc = '';
    for(const group of Object.keys(ACCOUNTS)){
      for(const acc of ACCOUNTS[group]){
        activeAccounts++;
        const bal = accountBalance(acc, group);
        const mp = accountMonthPnl(acc, group, mk);
        const profit = bal - (acc.start||50000); // lo que lleva hecho desde su balance inicial
        const cushion = acc.mll ? (bal - acc.mll) : null;
        if(cushion!==null && (minCushion===null || cushion<minCushion)){ minCushion=cushion; minCushionAcc=acc.id; }
        totalMonth+=mp; totalProfit+=profit;
        let ddBadge = '';
        if(cushion!==null){
          if(cushion < 800) ddBadge = ' <span class="badge" style="background:var(--red-dim);color:var(--red);">riesgo</span>';
          else if(cushion < 1500) ddBadge = ' <span class="badge warn">ojo</span>';
          else ddBadge = ' <span class="badge ok">sano</span>';
        }
        rows += '<tr><td>'+acc.label+' <span style="color:var(--text-dim);font-size:10px;">· '+GROUP_LABELS[group]+'</span></td>'
          +'<td>'+fmt(bal)+'</td>'
          +'<td class="'+(profit>=0?'pos':'neg')+'">'+(profit>=0?'+':'')+fmt(profit)+'</td>'
          +'<td class="'+(mp>=0?'pos':'neg')+'">'+(mp>=0?'+':'')+fmt(mp)+'</td>'
          +'<td>'+(cushion!==null? fmt(cushion)+ddBadge : '—')+'</td>'
          +'<td>'+fmt(Math.max(0,acc.target-bal))+'</td>'
          +'<td>'+pct(bal,acc.target,acc.start||50000)+'%</td></tr>';
      }
    }
    // Días de ganancia y pérdida del mes (según P&L combinado de cada día)
    const dayTotals = {};
    for(const e of state.entries.filter(e=>monthKey(e.date)===mk)){
      dayTotals[e.date] = (dayTotals[e.date]||0) + e.pnl;
    }
    let greenDays=0, redDays=0;
    for(const d of Object.keys(dayTotals)){
      if(dayTotals[d]>0) greenDays++;
      else if(dayTotals[d]<0) redDays++;
    }
    html += '<div class="kpis">';
    html += '<div class="kpi"><div class="label">P&L del mes (todas)</div><div class="value '+(totalMonth>=0?'pos':'neg')+'">'+(totalMonth>=0?'+':'')+fmt(totalMonth)+'</div></div>';
    html += '<div class="kpi"><div class="label">Profit combinado (desde inicio)</div><div class="value '+(totalProfit>=0?'pos':'neg')+'">'+(totalProfit>=0?'+':'')+fmt(totalProfit)+'</div></div>';
    html += '<div class="kpi"><div class="label">Días de ganancia (mes)</div><div class="value pos">'+greenDays+'</div></div>';
    html += '<div class="kpi"><div class="label">Días de pérdida (mes)</div><div class="value neg">'+redDays+'</div></div>';
    html += '<div class="kpi"><div class="label">Colchón DD más bajo</div><div class="value '+(minCushion!==null && minCushion<800?'neg':(minCushion!==null && minCushion<1500?'':'pos'))+'">'+(minCushion!==null? fmt(minCushion):'—')+'</div><div style="font-size:10px;color:var(--text-dim);margin-top:2px;">cuenta '+minCushionAcc+'</div></div>';
    html += '</div>';
    html += '<div class="section-title">Todas las cuentas</div>';
    html += '<table><thead><tr><th>Cuenta</th><th>Balance actual</th><th>Profit total</th><th>P&L del mes</th><th>Colchón DD</th><th>Falta p/target</th><th>Avance</th></tr></thead><tbody>'+rows+'</tbody></table>';
    html += '<div class="section-title">Calendario del mes — todas las cuentas</div>';
    html += renderCalendar(Object.keys(ACCOUNTS), mk);
  }
  else {
    const group = state.tab;
    const accs = ACCOUNTS[group] || [];
    html += '<div class="section-title">'+GROUP_LABELS[group]+'</div>';
    if(accs.length===0){
      html += '<div class="empty-msg">Aún no hay cuentas en este grupo. Cuando estén listas, pídele a Claude que las agregue.</div>';
    } else {
      // KPIs del grupo (igual que en el Resumen, pero solo con estas cuentas)
      let gProfit=0, gMonth=0, gMinCushion=null, gMinCushionAcc='';
      for(const acc of accs){
        const bal = accountBalance(acc, group);
        gProfit += bal - (acc.start||50000);
        gMonth += accountMonthPnl(acc, group, mk);
        const cushion = acc.mll ? (bal - acc.mll) : null;
        if(cushion!==null && (gMinCushion===null || cushion<gMinCushion)){ gMinCushion=cushion; gMinCushionAcc=acc.id; }
      }
      const gDayTotals = {};
      for(const e of state.entries.filter(e=>e.group===group && monthKey(e.date)===mk)){
        gDayTotals[e.date] = (gDayTotals[e.date]||0) + e.pnl;
      }
      let gGreen=0, gRed=0;
      for(const d of Object.keys(gDayTotals)){
        if(gDayTotals[d]>0) gGreen++;
        else if(gDayTotals[d]<0) gRed++;
      }
      html += '<div class="kpis">';
      html += '<div class="kpi"><div class="label">Ganancia total (todas las cuentas)</div><div class="value '+(gProfit>=0?'pos':'neg')+'">'+(gProfit>=0?'+':'')+fmt(gProfit)+'</div></div>';
      html += '<div class="kpi"><div class="label">P&L del mes</div><div class="value '+(gMonth>=0?'pos':'neg')+'">'+(gMonth>=0?'+':'')+fmt(gMonth)+'</div></div>';
      html += '<div class="kpi"><div class="label">Días de ganancia (mes)</div><div class="value pos">'+gGreen+'</div></div>';
      html += '<div class="kpi"><div class="label">Días de pérdida (mes)</div><div class="value neg">'+gRed+'</div></div>';
      html += '<div class="kpi"><div class="label">Colchón DD más bajo</div><div class="value '+(gMinCushion!==null && gMinCushion<800?'neg':'')+'">'+(gMinCushion!==null? fmt(gMinCushion):'—')+'</div><div style="font-size:10px;color:var(--text-dim);margin-top:2px;">cuenta '+gMinCushionAcc+'</div></div>';
      html += '</div>';

      let rows='';
      for(const acc of accs){
        const bal = accountBalance(acc, group);
        const mp = accountMonthPnl(acc, group, mk);
        const profit = bal - (acc.start||50000);
        const cushion = acc.mll ? (bal - acc.mll) : null;
        const es = monthEntries(group, acc.id, mk);
        const g = es.filter(e=>e.pnl>0).length;
        const r = es.filter(e=>e.pnl<0).length;
        let ddBadge = '';
        if(cushion!==null){
          if(cushion < 800) ddBadge = ' <span class="badge" style="background:var(--red-dim);color:var(--red);">riesgo</span>';
          else if(cushion < 1500) ddBadge = ' <span class="badge warn">ojo</span>';
          else ddBadge = ' <span class="badge ok">sano</span>';
        }
        rows += '<tr><td>'+acc.label+'</td><td>'+fmt(bal)+'</td>'
          +'<td class="'+(profit>=0?'pos':'neg')+'">'+(profit>=0?'+':'')+fmt(profit)+'</td>'
          +'<td class="'+(mp>=0?'pos':'neg')+'">'+(mp>=0?'+':'')+fmt(mp)+'</td>'
          +'<td>'+(cushion!==null? fmt(cushion)+ddBadge : '—')+'</td>'
          +'<td><span class="pos">'+g+'</span> / <span class="neg">'+r+'</span></td>'
          +'<td>'+fmt(Math.max(0,acc.target-bal))+'</td></tr>';
      }
      html += '<table><thead><tr><th>Cuenta</th><th>Balance</th><th>Profit total</th><th>P&L mes</th><th>Colchón DD</th><th>Días +/-</th><th>Falta target</th></tr></thead><tbody>'+rows+'</tbody></table>';

      html += '<div class="section-title">Calendario del mes — '+monthName+'</div>';
      html += renderCalendar([group], mk);
    }
  }

  html += '<footer>Dashboard diario de cuentas · Última actualización: 14 de julio de 2026</footer>';
  html += '</div>';
  app.innerHTML = html;

  // Eventos
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick = ()=>{ state.tab = btn.dataset.tab; state.statusMsg=''; state.statusType=''; render(); };
  });

  if(state.tab==='registrar'){
    const groupSel = document.getElementById('f-group');
    const accSel = document.getElementById('f-account');
    function refreshAccOptions(){
      const g = groupSel.value;
      accSel.innerHTML = (ACCOUNTS[g]||[]).map(a=>'<option value="'+a.id+'">'+a.label+'</option>').join('');
    }
    groupSel.onchange = refreshAccOptions;
    refreshAccOptions();

    document.getElementById('f-save').onclick = async ()=>{
      const group = groupSel.value;
      const accId = accSel.value;
      const date = document.getElementById('f-date').value;
      const pnlRaw = document.getElementById('f-pnl').value;
      if(!accId || !date){ state.statusMsg='Completa cuenta y fecha.'; state.statusType='err'; render(); return; }
      if(pnlRaw===''){ state.statusMsg='Escribe el P&L del día.'; state.statusType='err'; render(); return; }
      const pnl = parseFloat(pnlRaw);
      // Reemplaza si ya existe registro para esa cuenta+fecha
      state.entries = state.entries.filter(e=>!(e.group===group && e.accId===accId && e.date===date));
      state.entries.push({group, accId, date, pnl});
      const ok = await saveEntries();
      state.statusMsg = ok ? ('✅ Guardado: '+date+' → '+(pnl>=0?'+':'')+fmt(pnl)) : '⚠️ Error al guardar, intenta de nuevo';
      state.statusType = ok ? 'ok' : 'err';
      render();
    };

    document.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = async ()=>{
        const [group, accId, date] = btn.dataset.del.split('|');
        state.entries = state.entries.filter(e=>!(e.group===group && e.accId===accId && e.date===date));
        await saveEntries();
        state.statusMsg = 'Registro eliminado.';
        state.statusType = 'ok';
        render();
      };
    });
  }
}

(async ()=>{
  await loadEntries();
  render();
})();
</script>
</body>
</html>
